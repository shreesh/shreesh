<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Dashboard — Abhiram's Annaprashan</title>
  <meta name="theme-color" content="#6B1020">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --maroon: #6B1020; --deep-red: #8B1A1A; --gold: #C9993A; --cream: #FDF6EC; --warm-brown: #3D2314; --text-muted: #7A6155; --focus-ring: 0 0 0 3px rgba(201,153,58,0.5); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--warm-brown); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    #loginScreen { width: 100%; max-width: 400px; }
    .login-card { background: white; border-radius: 24px; padding: 48px 40px; box-shadow: 0 8px 40px rgba(61,35,20,0.1); border: 1px solid rgba(201,153,58,0.15); text-align: center; }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: var(--maroon); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .login-card label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; text-align: left; }
    .login-card input { width: 100%; padding: 14px 16px; border: 2px solid rgba(201,153,58,0.25); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--warm-brown); background: var(--cream); outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 20px; }
    .login-card input:focus { border-color: var(--gold); box-shadow: var(--focus-ring); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--maroon), var(--deep-red)); color: var(--gold); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(107,16,32,0.25); }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(107,16,32,0.35); }
    .login-btn:focus-visible { outline: none; box-shadow: 0 4px 16px rgba(107,16,32,0.25), var(--focus-ring); }
    .login-error { font-size: 13px; color: #C0392B; margin-top: -12px; margin-bottom: 16px; display: none; }
    .login-error.show { display: block; }

    #dashboard { display: none; width: 100%; max-width: 900px; }
    .dash-header { background: linear-gradient(135deg, var(--maroon), var(--deep-red)); border-radius: 24px 24px 0 0; padding: 32px 40px; color: white; }
    .dash-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--gold); margin-bottom: 4px; }
    .dash-header p { font-size: 13px; color: rgba(255,255,255,0.6); }
    .dash-body { background: white; border-radius: 0 0 24px 24px; padding: 32px 40px; box-shadow: 0 8px 40px rgba(61,35,20,0.08); border-left: 1px solid rgba(201,153,58,0.15); border-right: 1px solid rgba(201,153,58,0.15); border-bottom: 1px solid rgba(201,153,58,0.15); }

    .quick-links { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .quick-link { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 16px; background: var(--cream); border-radius: 16px; text-decoration: none; color: var(--warm-brown); transition: all 0.2s; border: 1px solid rgba(201,153,58,0.15); }
    .quick-link:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(61,35,20,0.08); }
    .quick-link .icon { font-size: 24px; }
    .quick-link .label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }

    .form-embed { width: 100%; border: none; border-radius: 16px; background: white; box-shadow: 0 4px 24px rgba(61,35,20,0.08); }
    .form-note { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; }
    .form-note a { color: var(--gold); text-decoration: none; }
    .form-note a:hover { text-decoration: underline; }

    .dash-footer { margin-top: 24px; display: flex; justify-content: space-between; align-items: center; }
    .dash-footer-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); text-decoration: none; padding: 8px 16px; border: 1px solid rgba(201,153,58,0.25); border-radius: 50px; transition: all 0.2s; }
    .dash-footer-btn:hover { border-color: var(--gold); color: var(--warm-brown); }
    .logout-btn { font-size: 12px; color: var(--text-muted); background: none; border: 1px solid rgba(122,97,85,0.3); border-radius: 50px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--maroon); color: var(--maroon); }

    @media (max-width: 600px) {
      .quick-links { grid-template-columns: repeat(2, 1fr); }
      .dash-header, .dash-body { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Abhiram's</div>
    <div class="login-sub">RSVP Dashboard — Annaprashan Sanskar</div>
    <label for="passwordInput">Password</label>
    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')attemptLogin()">
    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
    <button class="login-btn" onclick="attemptLogin()">Access Dashboard</button>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <h1>Abhiram's Annaprashan</h1>
    <p>RSVP Dashboard &nbsp;·&nbsp; April 26, 2026 &nbsp;·&nbsp; Bothell, WA</p>
  </div>

  <div class="dash-body">
    <div class="quick-links">
      <a href="https://abhirams-annaprashan.vercel.app" target="_blank" class="quick-link">
        <span class="icon">📄</span>
        <span class="label">View Invite</span>
      </a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdZQrr2nVsuueFppdAvRRx-R1-yqhxY13wlNgRFpQxjQ2jnOQ/viewform" target="_blank" class="quick-link">
        <span class="icon">📝</span>
        <span class="label">RSVP Form</span>
      </a>
      <a href="https://docs.google.com/spreadsheets/d/1sS9Vat5060o6zhk55ZPfRq8Dw3lXX3LhqK3Nxrjj2Mk/edit" target="_blank" class="quick-link">
        <span class="icon">📊</span>
        <span class="label">View Sheet</span>
      </a>
      <a href="https://docs.google.com/forms/d/1tTxvDRTKWrPiXi-ydLFl-mVP4tvNKIO_PlgT90uqL-E/edit" target="_blank" class="quick-link">
        <span class="icon">⚙️</span>
        <span class="label">Edit Form</span>
      </a>
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;">Live Form Responses</div>
      <iframe
        src="https://docs.google.com/forms/d/1tTxvDRTKWrPiXi-ydLFl-mVP4tvNKIO_PlgT90uqL-E/closedform"
        class="form-embed"
        height="420"
        title="RSVP Responses"
      ></iframe>
      <div class="form-note">Responses sync automatically from Google Form</div>
    </div>

    <div class="dash-footer">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<script>
  const CORRECT_PASS = 'Abhiram2026!';

  function attemptLogin() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === CORRECT_PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    } else {
      document.getElementById('loginError').classList.add('show');
      document.getElementById('passwordInput').focus();
    }
  }

  function logout() {
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  }
</script>
</body>
</html>
